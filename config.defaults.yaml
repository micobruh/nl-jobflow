search_criteria:
  accepted_seniority: [entry, junior]
  seniority_title_exclusions: []
  experience_policy:
    countable_types: [professional_employment, formal_internship, academic_employment]
  locations:
    groups:
      Amsterdam: [Amsterdam, Amstelveen, Diemen, Hoofddorp, Schiphol, Zaandam]
      Eindhoven: [Eindhoven, Veldhoven, Best, Geldrop, Helmond]
      Rotterdam: [Rotterdam, Schiedam, Delft, Capelle aan den IJssel]
      Utrecht: [Utrecht, Nieuwegein, Zeist, De Bilt]
      The Hague: [The Hague, Den Haag, Rijswijk, Voorburg, Leiden]
ind_register_url: https://ind.nl/en/public-register-recognised-sponsors/public-register-work
relevance_threshold: 75
job_match_threshold: 50
ats_threshold: 90
max_revision_attempts: 8
tier2_batch_size: 40
retention_days: 30
visual_references:
  cv: cv-reference.pdf
  letter: motivation-letter.pdf
regulated_role_patterns:
  - "\\b(?:physician|physician assistant|medical doctor|basisarts|huisarts|bedrijfsarts|verzekeringsarts|surgeon|nurse|verpleegkundige|midwife|verloskundige)\\b"
  - "\\b(?:physiotherapist|fysiotherapeut|clinical psychologist|gezondheidszorgpsycholoog|gz-psycholoog|psychotherapist|psychotherapeut|clinical technologist|klinisch technoloog|orthopedagoog-generalist)\\b"
  - "\\b(?:pharmacist|apotheker|dentist|tandarts)\\b"
  - "\\b(?:pharmacy assistant|apothekersassistent|dietitian|dietician|di[eë]tist|occupational therapist|ergotherapeut|skin therapist|huidtherapeut|clinical physicist|klinisch fysicus|speech therapist|logopedist)\\b"
  - "\\b(?:dental hygienist|mondhygi[eë]nist|exercise therapist|remedial therapist|oefentherapeut|optometrist|orthoptist|podiatrist|podotherapeut)\\b"
  - "\\b(?:diagnostic radiographer|therapeutic radiographer|radiodiagnostic(?:isch)? laborant|radiotherapeutisch laborant|dental prosthetist|tandprotheticus|verzorgende individual healthcare|verzorgende individuele gezondheidszorg|vig'er)\\b"
  - "\\b(?:advocaat|notaris|civil-law notary)\\b"
  - "\\b(?:licensed teacher|bevoegd docent|qualified teacher)\\b"
marketplace_discovery:
  enabled: true
  max_age_hours: 24
  max_results_per_source: 100
