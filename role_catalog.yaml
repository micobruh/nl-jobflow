families:
  engineering_science:
    label: Engineering and Science
    programme_patterns: ["engineering|techniek|physics|chemistry|mathematics|geophysics|architecture|automotive|systems and control|nuclear fusion|robotics|quantum information science|geomatics|marine technology|molecular science|mathematical sciences|chemical sciences"]
  technology_data_digital:
    label: Technology, Data and Digital
    programme_patterns: ["computer science|computing science|artificial intelligence|data science|cybersecurity|software|embedded systems|medical informatics|information science|information studies|business analytics|computational science|bioinformatics|quantum information science|geomatics|security and network engineering|business information technology"]
  product_design:
    label: Product and Design
    programme_patterns: ["industrial design|integrated product design|design for interaction|strategic product design|business information|psychology (?:and|&) technology|human[- ]technology interaction"]
  research_development:
    label: Research and Development
    programme_patterns: ["research|biomedical|biomolecular|neuroscience|bio-pharmaceutical|computational social science|computational science|mathematics|mathematical sciences|physics|medical engineering|nuclear fusion|nanobiology|psychobiology|molecular (?:and biophysical )?life sciences?|life science and technology|molecular science and technology|biological sciences?|biosciences|bioinformatics|forensic science|pharmacy|robotics|quantum information science|clinical technology|technical medicine"]
  health_clinical_operations:
    label: Health and Clinical Operations
    programme_patterns: ["clinical research|clinical sciences|clinical technology|epidemiology|health sciences|biomedical sciences|biomedical engineering|medical engineering|technical medicine|medical informatics|bioinformatics|nanobiology|molecular (?:and biophysical )?life sciences?|life science and technology|pharmacy|food and health"]
  quality_regulatory:
    label: Quality and Regulatory
    programme_patterns: ["quality|regulatory|toxicology|bio-pharmaceutical|food safety|pharmacy"]
  manufacturing_maintenance:
    label: Manufacturing and Maintenance
    programme_patterns: ["chemical engineering|mechanical engineering|systems and control|industrial engineering|automotive|robotics|marine technology"]
  supply_chain_operations:
    label: Supply Chain and Operations
    programme_patterns: ["supply chain|operations management|logistics|transport|industrial engineering"]
  finance_accounting_risk:
    label: Finance, Accounting and Risk
    programme_patterns: ["finance|account|actuarial|econometrics|risk|fiscal economics|financial mathematics"]
  sales_marketing_communications:
    label: Sales, Marketing and Communications
    programme_patterns: ["marketing|communication science|international business|business administration"]
  people_hr_organisation:
    label: People, HR and Organisation
    programme_patterns: ["human resource|work and organizational psychology|culture, organization and management"]
  legal_compliance_policy:
    label: Legal, Compliance and Policy
    programme_patterns: ["law|recht|governance|public administration|bestuurskunde|policy|criminology"]
  project_programme_consulting:
    label: Project, Programme and Consulting
    programme_patterns: ["management|innovation|complex systems|construction management|data science in business and entrepreneurship|computational social science"]
  sustainability_environment:
    label: Sustainability and Environment
    programme_patterns: ["sustainab|environment|climate|ecology|earth|food and health|future planet|energy science"]
  education_knowledge:
    label: Education and Knowledge
    programme_patterns: ["education|educatie|pedagog|learning sciences"]
  customer_business_support:
    label: Customer and Business Support
    programme_patterns: []

roles:
  data_scientist:
    family: technology_data_digital
    label: Data Scientist
    queries: [Data Scientist]
    title_pattern: "\\bdata scientist\\b|\\bdecision scientist\\b"
    strong: [data science, machine learning, predictive modelling, statistical modelling]
    weak: [python, sql, analytics, statistics]
    cv_role: data-scientist
    prompt: prompts/presets/data_ai_general_cv.md
  data_analyst:
    family: technology_data_digital
    label: Data Analyst
    queries: [Data Analyst]
    title_pattern: "\\bdata analyst\\b|\\banalytics analyst\\b"
    strong: [data analysis, data analytics, business intelligence, reporting analytics]
    weak: [sql, python, dashboard, statistics]
    cv_role: data-analyst
    prompt: prompts/presets/data_ai_general_cv.md
  data_engineer:
    family: technology_data_digital
    label: Data Engineer
    queries: [Data Engineer]
    title_pattern: "\\bdata(?: platform)? engineer\\b|\\banalytics engineer\\b"
    strong: [data engineering, data pipeline, etl, data platform]
    weak: [sql, python, database, cloud]
    cv_role: data-engineer
    prompt: prompts/presets/data_ai_general_cv.md
  machine_learning_engineer:
    family: technology_data_digital
    label: Machine Learning Engineer
    queries: [Machine Learning Engineer]
    title_pattern: "\\bmachine learning engineer\\b|\\bml engineer\\b"
    strong: [machine learning engineering, machine learning, mlops, model serving]
    weak: [python, ai, deployment, modelling]
    cv_role: ai-ml-engineer
    prompt: prompts/presets/data_ai_general_cv.md
  ai_engineer:
    family: technology_data_digital
    label: AI Engineer
    queries: [AI Engineer]
    title_pattern: "\\bai engineer\\b|\\bartificial intelligence engineer\\b"
    strong: [artificial intelligence, ai engineering, generative ai, llm]
    weak: [python, machine learning, retrieval, evaluation]
    cv_role: ai-ml-engineer
    prompt: prompts/presets/data_ai_general_cv.md
  software_engineer:
    family: technology_data_digital
    label: Software Engineer
    queries: [Junior Software Engineer, Graduate Software Engineer]
    title_pattern: "\\bsoftware (?:engineer|developer)\\b"
    strong: [software engineering, software development, application development]
    weak: [programming, coding, testing, debugging, git]
    cv_role: software-engineer
    prompt: prompts/presets/software_engineering_general_cv.md
  backend_engineer:
    family: technology_data_digital
    label: Backend Engineer
    queries: [Junior Backend Developer]
    title_pattern: "\\bback[- ]?end (?:engineer|developer)\\b"
