name: Bug report
description: Report a reproducible nl-jobflow problem using sanitized data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include a real CV, configuration, database, token, private path, or generated application. Report vulnerabilities through SECURITY.md.
  - type: input
    id: platform
    attributes:
      label: Platform and Python version
      placeholder: Ubuntu 24.04, Python 3.12
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      description: The exact command, with private paths and values replaced.
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Include relevant doctor and source-health output after removing private data.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed candidate data, credentials, private paths, and generated documents.
          required: true
