name: CI

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y libreoffice poppler-utils
      - run: python -m pip install -r requirements.txt
      - run: cp config.example.yaml config.yaml && cp master_cv.example.md master_cv.md
      - run: python -m unittest discover -s tests -q
      - run: git diff --check
